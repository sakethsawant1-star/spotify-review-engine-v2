name: Nightly Data Pipeline

on:
  schedule:
    # Run every day at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m spacy download en_core_web_sm

    - name: Create .env file
      run: |
        cat <<EOF > .env
        DATABASE_URL=${{ secrets.DATABASE_URL }}
        USE_POSTGRES=true
        GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
        REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}
        REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}
        REDDIT_USER_AGENT=${{ secrets.REDDIT_USER_AGENT }}
        BATCH_SIZE=35
        EOF
        echo "Created .env file successfully"
        
    - name: Initialize Database (Phase 1)
      run: |
        cd phase1-setup
        python -c "from db import DatabaseManager; db = DatabaseManager(); print(f'USE_POSTGRES={db.use_postgres}'); db.initialize(); print('Database initialized successfully')"
        
    - name: Run Scrapers (Phase 2)
      run: |
        cd phase2-scrapers
        python run_scrapers.py
        
    - name: Run Data Processing (Phase 3)
      run: |
        cd phase3-pipeline
        python run_pipeline.py
        
    - name: Run LLM Analysis (Phase 4)
      run: |
        cd phase4-agent
        python analyzer.py

