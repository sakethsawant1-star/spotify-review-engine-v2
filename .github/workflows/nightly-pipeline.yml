name: Nightly Data Pipeline

on:
  schedule:
    # Run every day at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Enable IPv6 on Runner
      uses: steebchen/ipv6-action@v2

      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m spacy download en_core_web_sm

    - name: Setup Environment Variables
      run: |
        echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
        echo "USE_POSTGRES=true" >> $GITHUB_ENV
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> $GITHUB_ENV
        echo "REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}" >> $GITHUB_ENV
        echo "REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}" >> $GITHUB_ENV
        echo "REDDIT_USER_AGENT=${{ secrets.REDDIT_USER_AGENT }}" >> $GITHUB_ENV
        echo "BATCH_SIZE=35" >> $GITHUB_ENV
        
    - name: Initialize Database (Phase 1)
      run: |
        cd phase1-setup
        python -c "import config; print(f'CONFIG POSTGRES: {config.USE_POSTGRES}'); from db import DatabaseManager; db = DatabaseManager(); print(f'DB POSTGRES: {db.use_postgres}'); db.initialize(); print('Database initialized successfully')"
        
    - name: Run Scrapers (Phase 2)
      run: |
        cd phase2-scrapers
        python run_scrapers.py
        
    - name: Run Data Processing (Phase 3)
      run: |
        cd phase3-pipeline
        python run_pipeline.py
        
    - name: Run LLM Analysis (Phase 4)
      run: |
        cd phase4-agent
        python analyzer.py

