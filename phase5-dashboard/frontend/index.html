<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify AI Analytics — Welcome</title>
    <link rel="stylesheet" href="index.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        body {
            background-color: var(--color-black);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: var(--font-family);
        }

        .welcome-container {
            text-align: center;
            max-width: 650px;
            padding: 40px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* Ambient glowing background */
        .ambient-glow {
            position: absolute;
            width: 450px;
            height: 450px;
            background-color: var(--color-primary);
            border-radius: 50%;
            opacity: 0.15;
            filter: blur(120px);
            pointer-events: none;
            z-index: 1;
            animation: float-glow 8s ease-in-out infinite alternate;
        }

        @keyframes float-glow {
            0% { transform: translate(-30px, -30px) scale(0.9); opacity: 0.12; }
            100% { transform: translate(30px, 30px) scale(1.1); opacity: 0.18; }
        }

        /* Animating Spotify Logo */
        .logo-container {
            width: 180px;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .spotify-logo-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(29, 185, 84, 0.4));
            animation: pulse-logo 3s ease-in-out infinite;
        }

        @keyframes pulse-logo {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 0 15px rgba(29, 185, 84, 0.4));
            }
            50% {
                transform: scale(1.08);
                filter: drop-shadow(0 0 35px rgba(29, 185, 84, 0.8));
            }
        }

        /* Wave effects around logo */
        .pulse-wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--color-primary);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            animation: ripple-wave 3s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
        }
        .pulse-wave:nth-child(2) {
            animation-delay: 1.5s;
        }

        @keyframes ripple-wave {
            0% { transform: scale(0.9); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* Text Styles */
        h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--color-text-primary);
            margin: 0;
            line-height: 1.2;
        }

        p {
            font-size: 16px;
            color: var(--color-text-secondary);
            line-height: 1.6;
            margin: 0;
        }

        /* Play Button (Spotify theme) */
        .btn-launch {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-primary);
            color: #000000;
            font-size: 16px;
            font-weight: 700;
            padding: 16px 44px;
            border-radius: 500px;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 20px rgba(29, 185, 84, 0.3);
            text-decoration: none;
        }

        .btn-launch:hover {
            background-color: var(--color-primary-light);
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(29, 185, 84, 0.5);
        }

        .btn-launch:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="welcome-container">
        <div class="logo-container">
            <div class="pulse-wave"></div>
            <div class="pulse-wave"></div>
            <svg class="spotify-logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="12" fill="#1DB954"/>
                <path d="M17.9 10.9C14.7 9 9.35 8.8 6.3 9.75C5.8 9.9 5.3 9.6 5.15 9.15C5 8.65 5.3 8.15 5.75 8C9.3 6.95 15.15 7.15 18.85 9.35C19.3 9.6 19.45 10.2 19.2 10.65C18.95 11 18.35 11.15 17.9 10.9ZM17.75 13.7C17.5 14.05 17.05 14.2 16.7 13.95C14 12.3 9.95 11.8 6.8 12.8C6.4 12.9 5.95 12.7 5.85 12.3C5.75 11.9 5.95 11.45 6.35 11.35C9.95 10.2 14.45 10.8 17.55 12.7C17.8 12.85 18 13.35 17.75 13.7ZM16.55 16.45C16.35 16.75 15.95 16.85 15.65 16.65C13.3 15.2 10.35 14.85 6.95 15.65C6.6 15.75 6.3 15.5 6.2 15.2C6.1 14.85 6.35 14.55 6.65 14.45C10.35 13.6 13.65 14 16.25 15.6C16.6 15.75 16.7 16.2 16.55 16.45Z" fill="black"/>
            </svg>
        </div>

        <div>
            <h1>Spotify AI Analytics</h1>
            <p style="margin-top: 12px;">Discover real-time user insights. Collect feedback, categorize complaints, and extract actionable sentiment patterns powered by Gemini AI.</p>
        </div>

        <a href="pipeline.html" class="btn-launch">
            Run Analytics Pipeline
        </a>
    </div>

</body>
</html>
